modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# YSM is required - this mod is specifically for YSM + Vivecraft compatibility
[[dependencies.${mod_id}]]
    modId="yes_steve_model"
    type="required"
    versionRange="[2.5,)"
    ordering="AFTER"
    side="BOTH"

# Vivecraft is required
[[dependencies.${mod_id}]]
    modId="vivecraft"
    type="required"
    versionRange="[1.21.1-1.3,)"
    ordering="AFTER"
    side="CLIENT"
